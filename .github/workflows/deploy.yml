name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_ACCUEIL=ghcr.io/${OWNER}/portfolio-accueil" >> $GITHUB_ENV
          echo "IMAGE_CV=ghcr.io/${OWNER}/portfolio-cv" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push accueil
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./accueil/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_ACCUEIL }}:latest
            ${{ env.IMAGE_ACCUEIL }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push cv
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cv/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_CV }}:latest
            ${{ env.IMAGE_CV }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ${{ vars.DEPLOY_PATH }}/${{ vars.DEPLOY_SUBPATH }}
            cd ${{ vars.DEPLOY_PATH }}/${{ vars.DEPLOY_SUBPATH }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "✓ Deploy done — $(date)"
